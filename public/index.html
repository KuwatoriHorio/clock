<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clock</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="clock" aria-live="polite">
      <div class="language-switcher" aria-label="Language">
        <button type="button" class="language-button" data-language="ja">日本語</button>
        <button type="button" class="language-button" data-language="en">English</button>
        <button type="button" class="language-button" data-language="zh">中文</button>
      </div>
      <p id="label" class="label">現在時刻</p>
      <time id="time" datetime="">--:--:--</time>
      <p id="date" class="date">----</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
